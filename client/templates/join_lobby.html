{% extends 'layout.html' %}

{% block body %}
<h2>Joining Lobby</h2>
<br><br><br>
<form id="joinLobbyForm" method="post">
    <input type="text" id="lobbyIdInput" name="lobby_id" placeholder="Lobby ID" maxlength="10" required>
    <br>
    <br>
    <input class="wiggling button" type="submit" value="Join Lobby">
</form>

<script>
document.getElementById('joinLobbyForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const lobbyId = document.getElementById('lobbyIdInput').value;
    if (lobbyId) {
        window.location.href = `/lobby/${encodeURIComponent(lobbyId)}`;
    }
});
</script>

{% endblock %}
