{% extends 'layout.html' %}

{% block body %}
<h3>Lobby ID:  </h3>

<canvas id="myCanvas"></canvas>
<button id="diceRollButton" class="button">Roll Dice</button>

<script>
    disablePawn = false;
    boardIndexes = {};
    finishLineIndices = {
        'red':['r1', 'r2', 'r3', 'r4', 'r5'],
        'blue':['b1', 'b2', 'b3', 'b4', 'b5'],
        'green':['g1', 'g2', 'g3', 'g4', 'g5'],
        'yellow':['y1', 'y2', 'y3', 'y4', 'y5']
    }
    let pawns = [
        {id: 'blue1', x: 1370, y: 400, color: '#3A6FC0', movesLeft: 50},
        {id: 'blue2', x: 1630, y: 400, color: '#3A6FC0', movesLeft: 50},
        {id: 'blue3', x: 1370, y: 650, color: '#3A6FC0', movesLeft: 50},
        {id: 'blue4', x: 1630, y: 650, color: '#3A6FC0', movesLeft: 50},

        {id: 'red1', x: 400, y: 400, color: '#E85B5B', movesLeft: 50},
        {id: 'red2', x: 650, y: 400, color: '#E85B5B', movesLeft: 50},
        {id: 'red3', x: 400, y: 650, color: '#E85B5B', movesLeft: 50},
        {id: 'red4', x: 650, y: 650, color: '#E85B5B', movesLeft: 50},

        {id: 'green1', x: 400, y: 1370, color: '#46A463', movesLeft: 50},
        {id: 'green2', x: 650, y: 1370, color: '#46A463', movesLeft: 50},
        {id: 'green3', x: 400, y: 1630, color: '#46A463', movesLeft: 50},
        {id: 'green4', x: 650, y: 1630, color: '#46A463', movesLeft: 50},

        {id: 'yellow1', x: 1370, y: 1370, color: '#D4AF37', movesLeft: 50},
        {id: 'yellow2', x: 1630, y: 1370, color: '#D4AF37', movesLeft: 50},
        {id: 'yellow3', x: 1370, y: 1630, color: '#D4AF37', movesLeft: 50},
        {id: 'yellow4', x: 1630, y: 1630, color: '#D4AF37', movesLeft: 50},
    ];
    
    const urlParams = new URLSearchParams(window.location.search);
    const lobbyIdRaw = urlParams.get('lobby_id');
    const lobbyId = decodeURIComponent(lobbyIdRaw);

    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 2048;
    canvas.height = 2048;

    let color;
    let pawn_idx;
    let target_destination;
    let boardData;
    
    setInterval(async () => {
        try {
            const response = await fetch('/data');
            const data = await response.json();
            boardData = data[lobbyId].board_status;    
            console.log(boardData);
        } catch (error) {
            console.error('Fetch error:', error);
        }
    }, 1000);

    setInterval(() => {
        updateBoard(boardData);
    }, 3000);

    function sendData() {
        fetch("/fetch_board", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                    lobby_id: lobbyId,
                    color: color,
                    pawn_idx: pawn_idx,
                    target_destination: target_destination
                })
        });
        console.log(`LobbyID: ${lobbyId}`);
        console.log(`Color: ${color}`);
        console.log(`pawn_idx: ${pawn_idx}`);
        console.log(`Target_Destination: ${target_destination}`);
    }

    function updateBoard(boardData) {
        if (!boardData || !boardData.board || !boardData.board.positions) {
            console.warn("boardData or positions missing");
            return;
        }

        let counter = 0; 
        const colors = ["blue", "green", "red", "yellow"];
        const pawnNumbers = ["1", "2", "3", "4"]; // renamed to avoid shadowing global `pawns`

        const positions = boardData.board.positions;
        
        colors.forEach(color => {
            pawnNumbers.forEach(pawnNum => {
                const pos = positions[color]?.[pawnNum];
                if (pos && boardIndexes[pos]) {
                    // Update the global pawns array positions for this pawn
                    // Find the pawn in the global pawns array by id
                    const pawnId = color + pawnNum;
                    const pawnObj = pawns.find(p => p.id === pawnId);
                    if (pawnObj) {
                        pawnObj.x = boardIndexes[pos].x;
                        pawnObj.y = boardIndexes[pos].y;
                    }
                } else {
                    console.warn(`Missing boardIndexes or position for ${color}${pawnNum}:`, pos);
                }
                counter++;
            });
        });
        
        drawBoard();
    }


    function metaQuarter(startX, startY, midX, midY, endX, endY, color="black") {
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(midX, midY);
        ctx.lineTo(endX, endY);
        ctx.closePath();
        ctx.fillStyle=color;
        ctx.fill();
    }

    function buildPart(rows, cols, size, gap, startX, startY) {
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                let x = startX + col * (size + gap);
                let y = startY + row * (size + gap);
                ctx.strokeStyle = "black";
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, size, size);
            }
        }
    }

    function paintPart(rows, cols, size, gap, startX, startY, color) {
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                let x = startX + col * (size + gap);
                let y = startY + row * (size + gap);
                ctx.fillStyle = color;
                ctx.fillRect(x + 7, y + 7, size - 4, size - 4);
            }
        }
    }

    // 🛠 Full board drawing in one place
    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Center black square
        ctx.fillStyle = "black";
        ctx.fillRect(1009, 1009, 30, 30);

        // Center square outline
        ctx.strokeStyle = "black";
        ctx.lineWidth = 6;
        ctx.strokeRect(869, 869, 310, 310);

        // Center triangles
        metaQuarter(871, 871, 1024, 1024, 1177, 871, "#3A6FC0");
        metaQuarter(871, 1177, 1024, 1024, 871, 871, "#E85B5B");
        metaQuarter(1177, 871, 1024, 1024, 1177, 1177, "#D4AF37");
        metaQuarter(871, 1177, 1024, 1024, 1177, 1177, "#46A463");

        // Center cross lines
        ctx.beginPath();
        ctx.moveTo(869, 869);
        ctx.lineTo(1179, 1179);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(1179, 869);
        ctx.lineTo(869, 1179);
        ctx.stroke();

        // Paths
        buildPart(6, 3, 100, 5, 869, 238);    // top
        buildPart(3, 6, 100, 5, 238, 869);    // left
        buildPart(3, 6, 100, 5, 1185, 869);   // right
        buildPart(6, 3, 100, 5, 869, 1185);   // bottom

        // Colored paths
        paintPart(5, 1, 100, 5, 969, 338, "#3A6FC0");   // blue top
        paintPart(1, 5, 100, 5, 338, 969, "#E85B5B");   // red left
        paintPart(1, 5, 100, 5, 1180, 969, "#D4AF37");  // yellow right
        paintPart(5, 1, 100, 5, 969, 1180, "#46A463");  // green bottom

        // Start squares
        paintPart(1, 1, 100, 5, 1074, 338, "#3A6FC0");  // blue start
        paintPart(1, 1, 100, 5, 338, 864, "#E85B5B");   // red start
        paintPart(1, 1, 100, 5, 1600, 1074, "#D4AF37"); // yellow start
        paintPart(1, 1, 100, 5, 864, 1600, "#46A463");  // green start

        // Home bases (lobbies)
        buildPart(2, 2, 150, 100, 338, 1300);           // blue lobby
        buildPart(2, 2, 150, 100, 338, 338);             // red lobby
        buildPart(2, 2, 150, 100, 1300, 1300);           // yellow lobby
        buildPart(2, 2, 150, 100, 1300, 338);            // green lobby

        // Color inside home bases
        paintPart(2, 2, 150, 100, 1295, 333, "#3A6FC0");    // blue
        paintPart(2, 2, 150, 100, 333, 333, "#E85B5B");     // red
        paintPart(2, 2, 150, 100, 1295, 1295, "#D4AF37");   // yellow
        paintPart(2, 2, 150, 100, 333, 1295, "#46A463");    // green

        drawNumbersOnPathSquares();
        drawAllPawns();
    }

    // Draw once initially
    drawBoard();
    drawPawn(1370, 400, "#3A6FC0"); // Blue pawn
    drawPawn(1630, 400, "#3A6FC0"); // Blue pawn 2
    drawPawn(1370, 650, "#3A6FC0"); // Blue pawn 3
    drawPawn(1630, 650, "#3A6FC0"); // Blue pawn 4

    drawPawn(400, 400, "#E85B5B"); // Red pawn 1
    drawPawn(650, 400, "#E85B5B"); // Red pawn 2
    drawPawn(400, 650, "#E85B5B"); // Red pawn 3
    drawPawn(650, 650, "#E85B5B"); // Red pawn 4

    drawPawn(400, 1370, "#46A463"); // Green pawn 1
    drawPawn(650, 1370, "#46A463"); // Green pawn 2
    drawPawn(400, 1630, "#46A463"); // Green pawn 3
    drawPawn(650, 1630, "#46A463"); // Green pawn 4

    drawPawn(1370, 1370, "#D4AF37"); // Yellow pawn 1
    drawPawn(1630, 1370, "#D4AF37"); // Yellow pawn 2
    drawPawn(1370, 1630, "#D4AF37"); // Yellow pawn 3
    drawPawn(1630, 1630, "#D4AF37"); // Yellow pawn 4

    // Dice roll logic
    const diceRollButton = document.getElementById('diceRollButton');
    diceRollButton.addEventListener('click', function() {
        const diceValue = Math.floor(Math.random() * 6) + 1; // Random 1-6
        displayDiceRoll(diceValue);
        choosePawn(diceValue);
    });

    function displayDiceRoll(value) {
        drawBoard();  // 🛠 Always redraw full board first
        ctx.font = "100px Arial";
        ctx.fillStyle = "black";
        ctx.fillText(`Rolled: ${value}`, canvas.width / 2 - 150, 100);
    }

    function drawPawn(x, y, color="blue") {
        ctx.beginPath();  
        ctx.arc(x, y, 30, 0, Math.PI * 2);  // Circle pawn
        ctx.fillStyle = color;
        ctx.fill();
        ctx.lineWidth = 5;
        ctx.strokeStyle = "black";
        ctx.stroke();
    }

    function drawNumbersOnPathSquares() {
    ctx.font = "30px Arial";
    ctx.fillStyle = "black";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // Top path: 6 rows x 3 cols
    const numbers1 = [1,2,3,52,"b1",4,51,"b2",5,50,"b3",6,49,"b4",7,48,"b5",8,50,"b6",9];
    let counter = 0;
    for (let row = 0; row < 6; row++) {
        for (let col = 0; col < 3; col++) {
            let x = 869 + col * (100 + 5);
            let y = 238 + row * (100 + 5);
            const value = numbers1[counter];
            ctx.fillText(value, x + 50, y + 50);
            boardIndexes[value] = { x: x + 50, y: y + 50 };
            counter++;
        }
    }

    // Right path: 3 rows x 6 cols
    const numbers2 = [9,10,11,12,13,14,"y5","y4","y3","y2","y1",15,21,20,19,18,17,16];
    counter = 0;
    for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 6; col++) {
            let x = 1185 + col * (100 + 5);
            let y = 869 + row * (100 + 5);
            const value = numbers2[counter];
            ctx.fillText(value, x + 50, y + 50);
            boardIndexes[value] = { x: x + 50, y: y + 50 };
            counter++;
        }
    }

    // Bottom path: 6 rows x 3 cols
    const numbers3 = [34,"g5",22,33,"g4",23,32,"g3",24,31,"g2",25,30,"g1",26,29,28,27];
    counter = 0; 
    for (let row = 0; row < 6; row++) {
        for (let col = 0; col < 3; col++) {
            let x = 869 + col * (100 + 5);
            let y = 1185 + row * (100 + 5);
            const value = numbers3[counter];
            ctx.fillText(value, x + 50, y + 50);
            boardIndexes[value] = { x: x + 50, y: y + 50 };
            counter++;
        }
    }

    // Left path: 3 rows x 6 cols (REVERSED order)
    let numbers4 = [42,43,44,45,46,47,41,"r1","r2","r3","r4","r5",40,39,38,37,36,35];
    numbers4.reverse();
    counter = 0;
    for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 6; col++) {
            let x = 769 - col * (100 + 5);
            let y = 1085 - row * (100 + 5);
            const value = numbers4[counter];
            ctx.fillText(value, x + 50, y + 50);
            boardIndexes[value] = { x: x + 50, y: y + 50 };
            counter++;
        }
    }
}

function drawAllPawns() {
    for (let pawn of pawns) {
        drawPawn(pawn.x, pawn.y, pawn.color);
    }
}

function choosePawn(diceValue) {
    canvas.addEventListener("click", function onClick(event) {
        const rect = canvas.getBoundingClientRect();
        const clickX = event.clientX - rect.left;
        const clickY = event.clientY - rect.top;

        for (let pawn of pawns) {
            const distance = Math.hypot(clickX - pawn.x, clickY - pawn.y);
            if (distance < 30) { // Inside the pawn
                console.log('You clicked pawn:', pawn.id);
                pawn_idx = pawn.id[pawn.id.length-1];
                color = pawn.id.slice(0, pawn.id.length-1);

                // Find current pawn position (index)
                let currentIndex = Object.keys(boardIndexes).find(key => {
                    let pos = boardIndexes[key];
                    return Math.abs(pos.x - pawn.x) < 5 && Math.abs(pos.y - pawn.y) < 5;
                });

                console.log('Current index before:', currentIndex);

                if (!currentIndex){
                    // Pawn is at home (base), can only move if dice is 6
                    if (diceValue === 6) {
                        let startSquare;
                        if (pawn.color === "#3A6FC0") {          // Blue
                            startSquare = 4;
                        } else if (pawn.color === "#E85B5B") {   // Red
                            startSquare = 43;
                        } else if (pawn.color === "#46A463") {   // Green
                            startSquare = 30;
                        } else if (pawn.color === "#D4AF37") {   // Yellow
                            startSquare = 17;
                        }
                        pawn.x = boardIndexes[startSquare].x;
                        pawn.y = boardIndexes[startSquare].y;
                        
                        target_destination = startSquare;
                        sendData();
                        drawBoard();
                    } else {
                        // alert("You need to roll a 6 to move a pawn out of the base!");
                    }
                } else {

                    pawn.movesLeft -= diceValue;
                    console.log(pawn.movesLeft);
                    console.log(color);
                    console.log('Current index after:', currentIndex);
                    if (pawn.movesLeft < 0){
                        let finishLineIdx = Math.abs(pawn.movesLeft) - 1
                        pawn.x = boardIndexes[finishLineIndices[color][finishLineIdx]].x;
                        pawn.y = boardIndexes[finishLineIndices[color][finishLineIdx]].y;
                        target_destination = finishLineIndices[color][finishLineIdx];
                        sendData();
                        drawBoard();
                    } else {
                        let newIndex = parseInt(currentIndex) + diceValue;
                        if (newIndex > 52) newIndex = newIndex - 52; // Wrap around if necessary
                        if (boardIndexes[newIndex]) {
                            pawn.x = boardIndexes[newIndex].x;
                            pawn.y = boardIndexes[newIndex].y;
                            target_destination = newIndex;
                            sendData();
                            drawBoard();
                        }
                    }
                    
                }

                canvas.removeEventListener('click', onClick);
                break;
            }
        }
    });
}


function onPawnClick(event) {
    const rect = canvas.getBoundingClientRect();
    const clickX = event.clientX - rect.left;
    const clickY = event.clientY - rect.top;

    for (let pawn of pawns) {
        const distance = Math.hypot(clickX - pawn.x, clickY - pawn.y);
        if (distance < 30) { // Inside the pawn
            console.log('You clicked pawn:', pawn.id);
            pawn_idx = pawn.id[pawn.id.length-1];
            color = pawn.id.slice(0, pawn.id.length-2);
            console.log(color);

            let startSquare;
            if (pawn.color === "#3A6FC0") {          // Blue
                startSquare = 4;
            } else if (pawn.color === "#E85B5B") {   // Red
                startSquare = 43;
            } else if (pawn.color === "#46A463") {   // Green
                startSquare = 30;
            } else if (pawn.color === "#D4AF37") {   // Yellow
                startSquare = 17;
            }

            // Move the pawn to the starting square
            pawn.x = boardIndexes[startSquare].x;
            pawn.y = boardIndexes[startSquare].y;
            drawBoard();

            // 🛑 Stop listening after move
            canvas.removeEventListener('click', onPawnClick);
            break;
        }
    }
}

</script>

{% endblock %}
